name: Publish NuGet Package

on:
  push:
    branches: [main]
    paths:
      - 'Conspectare.Client/**'

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Conspectare.Client/Conspectare.Client.csproj

      - name: Build
        run: dotnet build Conspectare.Client/Conspectare.Client.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Conspectare.Client/Conspectare.Client.csproj -c Release --no-build -o ./nupkgs

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --source "https://nuget.pkg.github.com/bono-ro/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
