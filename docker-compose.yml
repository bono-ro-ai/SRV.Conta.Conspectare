services:
  db:
    image: mariadb:11.4
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-conspectare_root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-conspectare}
      MARIADB_USER: ${MARIADB_USER:-conspectare}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-conspectare_pass}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: ${AWS_REGION:-eu-central-1}
    volumes:
      - ./localstack:/etc/localstack/init/ready.d

  migrate:
    build:
      context: .
      dockerfile: Conspectare.Api/Dockerfile
    command: ["dotnet", "Conspectare.Api.dll", "--migrate"]
    environment:
      ConnectionStrings__ConspectareDb: "Server=db;Port=3306;Database=${MARIADB_DATABASE:-conspectare};Uid=${MARIADB_USER:-conspectare};Pwd=${MARIADB_PASSWORD:-conspectare_pass};"
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Conspectare.Api/Dockerfile
    ports:
      - "5100:5100"
    environment:
      ConnectionStrings__ConspectareDb: "Server=db;Port=3306;Database=${MARIADB_DATABASE:-conspectare};Uid=${MARIADB_USER:-conspectare};Pwd=${MARIADB_PASSWORD:-conspectare_pass};"
      Aws__ServiceUrl: http://localstack:4566
      Aws__AccessKeyId: ${AWS_ACCESS_KEY_ID:-test}
      Aws__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY:-test}
      Aws__Region: ${AWS_REGION:-eu-central-1}
      Aws__BucketName: ${AWS__BucketName:-docpipeline-dev}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Conspectare.WorkerHost/Dockerfile
    ports:
      - "5101:5101"
    environment:
      ConnectionStrings__ConspectareDb: "Server=db;Port=3306;Database=${MARIADB_DATABASE:-conspectare};Uid=${MARIADB_USER:-conspectare};Pwd=${MARIADB_PASSWORD:-conspectare_pass};"
      Aws__ServiceUrl: http://localstack:4566
      Aws__AccessKeyId: ${AWS_ACCESS_KEY_ID:-test}
      Aws__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY:-test}
      Aws__Region: ${AWS_REGION:-eu-central-1}
      Aws__BucketName: ${AWS__BucketName:-docpipeline-dev}
      Claude__ApiKey: ${CLAUDE_API_KEY:-}
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      Llm__Provider: ${LLM_PROVIDER:-claude}
      Llm__MultiModel__Enabled: ${LLM_MULTIMODEL_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
